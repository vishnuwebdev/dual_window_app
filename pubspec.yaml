name: multi_window_app
description: Multi-window Flutter Desktop application with physical locker gRPC control

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # gRPC and Protocol Buffers
  grpc: ^5.1.0
  protobuf: ^6.0.0

  # HTTP (VaultGroup cloud: unit registration / JWT sign-in — see
  # core/registration/unit_registration_service.dart)
  http: ^1.2.0

  # State Management & Architecture
  flutter_bloc: ^8.1.3
  bloc: ^8.1.1
  equatable: ^2.0.5

  # Utilities
  logger: ^2.0.0
  get_it: ^7.6.0
  shared_preferences: ^2.2.0

  # UI/UX
  material_design_icons_flutter: ^7.0.7
  desktop_multi_window: ^0.3.0
  screen_retriever: ^0.2.0
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    # Bundled so the app can read its own `version:` field at runtime (see
    # core/utilities/app_version.dart) instead of a hardcoded literal that
    # silently drifts out of sync — see `LockerManagementPage`, which was
    # showing "Version 0.1.0" long after this file had moved on to 1.0.0+1.
    - pubspec.yaml

  fonts:
    - family: Metropolis
      fonts:
        - asset: assets/fonts/metropolis_regular.otf
        - asset: assets/fonts/metropolis_bold.otf
          weight: 700
        - asset: assets/fonts/metropolis_extra_bold.otf
          weight: 800
